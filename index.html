<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Hebrew OCR</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  direction: rtl;
  background: #111;
  color: #eee;
  padding: 10px;
  margin: 0;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

#dropZone {
  border: 2px dashed #555;
  padding: 20px;
  text-align: center;
  margin-bottom: 10px;
  cursor: pointer;
  border-radius: 12px;
  background: #222;
}

#dropZone input {
  display: none;
}

#previewContainer {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.preview {
  max-height: 120px;
  margin: 0 5px;
  border-radius: 8px;
  border: 1px solid #555;
  cursor: grab;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #444;
  color: #fff;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 10px;
  background: #222;
  color: #fff;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
  resize: vertical;
}

::-webkit-scrollbar {
  height: 8px;
}
::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 4px;
}
</style>
</head>

<body>
<h2>🧾 OCR עברית</h2>

<label id="dropZone">
  לחץ כאן או גרור תמונות
  <input type="file" id="fileInput" multiple accept="image/*">
</label>

<div id="previewContainer"></div>

<button onclick="startOCR()">חלץ טקסט</button>
<button onclick="downloadText()">⬇️ הורד טקסט</button>

<textarea id="output" placeholder="כאן יופיע הטקסט..."></textarea>

<script>
let files = [];
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const output = document.getElementById('output');

fileInput.onchange = () => handleFiles(fileInput.files);

function handleFiles(selectedFiles) {
  files = Array.from(selectedFiles);
  previewContainer.innerHTML = "";
  files.forEach((file, i) => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    img.className = 'preview';
    img.dataset.index = i;
    previewContainer.appendChild(img);
  });
}

let sortable = new Sortable(previewContainer, {
  animation: 150,
  scroll: true,
  onEnd: () => {
    const newOrder = [];
    previewContainer.querySelectorAll('img').forEach(img => {
      const index = img.dataset.index;
      newOrder.push(files[index]);
    });
    files = newOrder;
  }
});

function preprocessImage(img) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const gray = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = gray > 140 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }
  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

async function startOCR() {
  output.value = "";
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const img = new Image();
    img.src = URL.createObjectURL(file);
    await new Promise(resolve => { img.onload = resolve; });
    const processed = preprocessImage(img);
    const { data } = await Tesseract.recognize(processed, 'heb+eng', {
      logger: m => {
        if (m.status === "recognizing text") {
          output.value = `מעבד תמונה ${i+1}/${files.length} - ${(m.progress*100).toFixed(0)}%`;
        }
      }
    });
    output.value += `--- תמונה ${i+1} ---\n`;
    output.value += data.text + "\n\n";
  }
  output.value += "✅ סיום!";
}

function downloadText() {
  const blob = new Blob([output.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ocr.txt';
  a.click();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
